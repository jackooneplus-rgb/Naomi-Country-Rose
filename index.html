<body>

  <!-- LANDING PAGE -->
  <div id="homePage" class="page">
    <div class="hero">
      <div class="hero-content">
        <h1>Naomi Country Rose 🌹</h1>
        <p>Hey you… ready to play something beautiful?</p>

        <button class="primary-btn" onclick="goToSong()">Start Playing 🎸</button>
        <button class="secondary-btn" onclick="openNote()">A little note for you 💌</button>
      </div>
    </div>
  </div>

  <!-- SONG PAGE -->
  <div id="songPage" class="page hidden">
    <div class="song-container">
      <button onclick="goHome()">← Back</button>
      <h2>Tonight’s Song</h2>

      <pre>
[G] Sun goes down on the dusty road  
[D] Got my guitar and a lightened load  
[Em] Singing sweet for the ones I love  
[C] Underneath the stars above  
      </pre>
    </div>
  </div>

  <!-- MODAL -->
  <div id="noteModal" class="modal hidden">
    <div class="modal-content">
      <p>You're genuinely something special… don’t ever forget that.</p>
      <button onclick="closeNote()">Close</button>
    </div>
  </div>

  <script src="index.js"></script>
</body>
